name: Build macOS

on:
  push:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Build
      run: |
        xcodebuild -project SystemMonitorApp/SystemMonitorApp.xcodeproj \
          -scheme SystemMonitorApp \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
