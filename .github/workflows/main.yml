name: Build macOS

on:
  push:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: List files
      run: |
        echo "Contenu du repo :"
        ls -la
        
    - name: Find Xcode project
      run: |
        find . -name "*.xcodeproj"
        
    - name: Build
      run: |
        xcodebuild -project SystemMonitorApp-2/SystemMonitorApp.xcodeproj \
          -scheme SystemMonitorApp \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
